kind = "web"
previewPath = "/"
title = "PvP Leaderboard"
version = "1.0.0"
id = "artifacts/pvp-leaderboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24684

[services.development]
run = "pnpm --filter @workspace/pvp-leaderboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pvp-leaderboard", "run", "build" ]
publicDir = "artifacts/pvp-leaderboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24684"
BASE_PATH = "/"
